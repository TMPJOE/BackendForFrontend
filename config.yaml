# BFF (Backend for Frontend) Configuration

server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 15s
  write_timeout: 15s
  idle_timeout: 60s

jwt:
  issuer: "users-service"
  expiration: "24h"

# Downstream microservice URLs
downstream_services:
  hotel_service_url: "${HOTEL_SERVICE_URL:http://localhost:8084}"
  room_service_url: "${ROOM_SERVICE_URL:http://localhost:8085}"
  booking_service_url: "${BOOKING_SERVICE_URL:http://localhost:8086}"
  reservation_service_url: "${BOOKING_SERVICE_URL:http://localhost:8086}"
  media_service_url: "${MEDIA_SERVICE_URL:http://localhost:8082}"
  timeout: 30s

rate_limit:
  enabled: true
  requests_per_second: 100
  burst: 200

circuit_breaker:
  enabled: true
  max_failures: 5
  timeout: 30s
  reset_timeout: 60s

health:
  path: "/health"
  ready_path: "/ready"

logging:
  level: "info"
  format: "json"
