# BFF (Backend for Frontend) Configuration

server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 15s
  write_timeout: 15s
  idle_timeout: 60s

jwt:
  issuer: "users-service"
  expiration: "24h"

# Downstream microservice URLs
downstream_services:
  hotel_service_url: "http://hotel-service:8084"
  room_service_url: "http://rooms-service:8085"
  booking_service_url: "http://booking-service:8086"
  timeout: 30s

rate_limit:
  enabled: true
  requests_per_second: 100
  burst: 200

circuit_breaker:
  enabled: true
  max_failures: 5
  timeout: 30s
  reset_timeout: 60s

health:
  path: "/health"
  ready_path: "/ready"

logging:
  level: "info"
  format: "json"
